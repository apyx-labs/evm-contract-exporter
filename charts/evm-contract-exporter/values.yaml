# values.yaml — defaults for the evm-contract-exporter chart.
#
# Required overrides for a working install:
#   - image.tag              (container image tag to deploy)
#   - rpcUrlSecret.name/key  (existing Secret holding ETH_RPC_URL)
#   - config                 (exporter YAML config; see examples/*.yaml)
#   - abis                   (map of filename -> raw ABI JSON; referenced from config via abi_path)

namespace: monitoring

replicaCount: 1

image:
  repository: ghcr.io/apyx-labs/evm-contract-exporter
  tag: ""
  pullPolicy: IfNotPresent

# Public image needs no pull secret by default. Set for private mirrors.
imagePullSecrets: []

rpcUrlSecret:
  name: evm-contract-exporter-rpc
  key: ETH_RPC_URL

logLevel: info
logFormat: json

service:
  type: ClusterIP
  port: 9100

readinessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  limits:
    cpu: 250m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

podAnnotations: {}
extraEnv: []
nodeSelector: {}
tolerations: []
affinity: {}

# Hint used only in NOTES.txt to grep your contract metrics after install.
metricPrefixHint: ""

config: {}
abis: {}
