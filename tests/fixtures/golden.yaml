chain:
  rpc_url: ${GOLDEN_RPC_URL}
  chain_id: 1
labels:
  chain: ethereum
contracts:
  - name: feed
    metric_prefix: feed
    abi_inline: |-
      [
        {"type":"function","name":"latestRoundData","inputs":[],"outputs":[{"name":"roundId","type":"uint80"},{"name":"answer","type":"int256"},{"name":"startedAt","type":"uint256"},{"name":"updatedAt","type":"uint256"},{"name":"answeredInRound","type":"uint80"}],"stateMutability":"view"},
        {"type":"function","name":"decimals","inputs":[],"outputs":[{"name":"","type":"uint8"}],"stateMutability":"view"},
        {"type":"function","name":"balanceOf","inputs":[{"name":"a","type":"address"}],"outputs":[{"name":"","type":"uint256"}],"stateMutability":"view"}
      ]
    instances:
      - address: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5b8419"
        labels:
          pair: eth_usd
    metrics:
      - function: decimals
      - function: latestRoundData
        outputs:
          - index: 1
            name: answer
            scale: 1e8
      - function: balanceOf
        calls:
          - args: ["0x0000000000000000000000000000000000000010"]
            labels: { holder: a }
          - args: ["0x0000000000000000000000000000000000000011"]
            labels: { holder: b }
